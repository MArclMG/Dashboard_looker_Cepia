name: Generar Grafo de Endosos

on:
  schedule:
    # Se ejecuta automáticamente todos los días a las 08:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la web de GitHub con un clic

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install pandas pyvis gspread google-auth

      - name: Ejecutar script de generación del grafo
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python generar_grafo.py

      - name: Desplegar automáticamente a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # O la carpeta donde guardes tu index.html
