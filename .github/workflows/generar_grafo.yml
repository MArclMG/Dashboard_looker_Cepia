name: Generar y Publicar Grafo de Endosos

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Autenticar en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas gspread google-auth pyvis

      - name: Ejecutar script de extracción y generación
        env:
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
        run: |
          python generar_grafo.py

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
